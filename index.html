<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione o perfil para continuar assistindo na Netflix">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Área principal do conteúdo da página -->
    <main>
        <!-- Título principal perguntando quem está assistindo -->
        <h1>Quem está assistindo?</h1>
        <!-- Seção para os perfis disponíveis -->
        <section aria-label="Perfis disponíveis">
            <!-- Container de navegação para os perfis -->
            <nav class="profiles">
                <!-- Lista não ordenada dos itens de perfil -->
                <ul>
                    <!-- Item de perfil para Link -->
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="/assets/perfil-1.jpg" alt="Imagem do Link" width="200" height="200">
                                <figcaption>Link</figcaption>
                            </figure>
                        </a>
                    </li>
                    <!-- Item de perfil para Zelda -->
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="/assets/perfil-2.jpg" alt="Imagem da Princesa Zelda" width="200" height="200">
                                <figcaption>Zelda</figcaption>
                            </figure>
                        </a>
                    </li>
                    <!-- Item de perfil para Korok -->
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="/assets/perfil-3.jpg" alt="Imagem de um Korok" width="200" height="200">
                                <figcaption>Korok</figcaption>
                            </figure>
                        </a>
                    </li>
                    <!-- Item de perfil para Lobo -->
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="/assets/perfil-4.jpg" alt="Imagem do Link Lobo" width="200" height="200">
                                <figcaption>Lobo</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
            <!-- Container para o botão de gerenciar perfis -->
            <span class="manage-profiles">
                <a href="#" class="profile-button">Gerenciar perfis</a>
            </span>
        </section>

    </main>
    <!-- Script principal para funcionalidades da página -->
    <script type="module" src="catalogo/js/main.js"></script>
</body>
</html>
