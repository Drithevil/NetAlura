<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione o perfil para continuar assistindo na Netflix">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-1.webp" alt="Imagem do Link" width="200" height="200">
                        <figcaption>Link</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-2.jpg" alt="Imagem da Zelda" width="200" height="200">
                        <figcaption>Zelda</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-3.jpg" alt="Imagem de um Korok" width="200" height="200">
                        <figcaption>Korok</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-4.jpg" alt="Imagem do Link Lobo" width="200" height="200">
                        <figcaption>Lobo</figcaption>
                    </figure>
                </a>
            </nav>
        </section>
    </main>
</body>
</html>
